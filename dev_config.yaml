# Development Configuration for Multi-Agent Genie System
# This config is used for development deployment to Model Serving
# Sync source: databricks.yml → targets.dev.variables

# Unity Catalog Configuration (sync with databricks.yml dev target)
catalog_name: serverless_dbx_unifiedchat_dev_catalog
schema_name: multi_agent_genie

# LLM Endpoint Configuration - Diversified by Agent Role
# Default/Fallback endpoint (used if specific endpoint not set)
llm_endpoint: databricks-claude-sonnet-4-5

# Agent-Specific Endpoints (Balanced Configuration - Recommended)
llm_endpoint_clarification: databricks-claude-haiku-4-5
llm_endpoint_planning: databricks-claude-sonnet-4-5
llm_endpoint_sql_synthesis_table: databricks-claude-sonnet-4-5
llm_endpoint_sql_synthesis_genie: databricks-claude-sonnet-4-5
llm_endpoint_execution: databricks-claude-haiku-4-5
llm_endpoint_summarize: databricks-claude-haiku-4-5

# Vector Search Configuration (sync with databricks.yml dev target)
vs_endpoint_name: genie_multi_agent_vs
vector_search_index: serverless_dbx_unifiedchat_dev_catalog.multi_agent_genie.enriched_genie_docs_chunks_vs_index
embedding_model: databricks-gte-large-en

# Lakebase Configuration (for State Management)
lakebase_instance_name: multi-agent-genie-system-state-db
lakebase_embedding_endpoint: databricks-gte-large-en
lakebase_embedding_dims: 1024

# Genie Space IDs (dev spaces - sync with databricks.yml dev target)
genie_space_ids:
  - 01f11b27d1121e2bb00d6ecd846b1988
  - 01f11b27d23a1ab195fa7ba8efc06d13
  - 01f11b27d3ea149694cf608c3d278673

# SQL Warehouse ID (for Genie spaces)
# ⚠️ TODO: Update with the dev workspace SQL Warehouse ID if different
sql_warehouse_id: 78ad038820b88d95

# Table Metadata Enrichment (sync with databricks.yml dev target)
sample_size: 20
max_unique_values: 20
genie_exports_volume: serverless_dbx_unifiedchat_dev_catalog.multi_agent_genie.volume
enriched_docs_table: serverless_dbx_unifiedchat_dev_catalog.multi_agent_genie.enriched_genie_docs

# Model Serving Configuration
model_name: multi_agent_genie_system_dev
endpoint_name: multi-agent-genie-endpoint-dev
workload_size: Small
scale_to_zero: true
