# ETL Pipeline — Export Genie Spaces → Enrich Table Metadata → Build Vector Search Index
#
# Run:
#   databricks bundle run etl_pipeline         # dev (default)
#   databricks bundle run etl_pipeline -t prod # prod
#
# All variables are resolved from databricks.yml per target.
# Notebook paths use ../ because this file sits one level below the bundle root.

resources:
  jobs:
    etl_pipeline:
      name: multi_agent_genie_etl_pipeline
      description: >-
        End-to-end ETL pipeline: export Genie spaces, enrich table metadata
        with LLM, and build the vector search index.
        Runs on serverless compute (no cluster definition needed).
      max_concurrent_runs: 1
      tags:
        project: multi_agent_genie
        pipeline: etl

      tasks:
        # -------------------------------------------------------------------
        # Task 1 — Export Genie Spaces to UC Volume
        # -------------------------------------------------------------------
        - task_key: export_genie_spaces
          notebook_task:
            notebook_path: ../etl/01_export_genie_spaces.py
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              volume_name: ${var.volume_name}
              genie_space_ids: ${var.genie_space_ids}
              databricks_host: ""
              databricks_token: ""
          timeout_seconds: 3600

        # -------------------------------------------------------------------
        # Task 2 — Enrich Table Metadata (depends on Task 1)
        # -------------------------------------------------------------------
        - task_key: enrich_table_metadata
          depends_on:
            - task_key: export_genie_spaces
          notebook_task:
            notebook_path: ../etl/02_enrich_table_metadata.py
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              volume_name: ${var.volume_name}
              enriched_docs_table: ${var.enriched_docs_table}
              llm_endpoint: ${var.llm_endpoint}
              sample_size: ${var.sample_size}
              max_unique_values: ${var.max_unique_values}
          timeout_seconds: 7200

        # -------------------------------------------------------------------
        # Task 3 — Build Vector Search Index (depends on Task 2)
        # -------------------------------------------------------------------
        - task_key: build_vector_search_index
          depends_on:
            - task_key: enrich_table_metadata
          notebook_task:
            notebook_path: ../etl/03_build_vector_search_index.py
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              source_table: ${var.source_table}
              vs_endpoint_name: ${var.vs_endpoint_name}
              embedding_model: ${var.embedding_model}
              pipeline_type: ${var.pipeline_type}
          timeout_seconds: 3600
