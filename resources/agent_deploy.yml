# Agent Deployment — Integration Test + Model Serving Deploy
#
# Run integration test only:
#   databricks bundle run agent_integration_test         # dev
#   databricks bundle run agent_integration_test -t prod # prod
#
# Run full deploy (deploys then validates live endpoint):
#   databricks bundle run agent_deploy         # dev
#   databricks bundle run agent_deploy -t prod # prod
#
# All parameters resolved from databricks.yml (single source of truth).
# Notebook paths use ../ because this file sits one level below the bundle root.

resources:
  jobs:
    agent_integration_test:
      name: multi_agent_integration_test
      description: Standalone integration test — validates agent code after deployment
      tags:
        project: multi_agent_genie
        pipeline: agent
      tasks:
        - task_key: test_agent
          notebook_task:
            notebook_path: ../Notebooks/test_agent_databricks.py
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              sql_warehouse_id: ${var.sql_warehouse_id}
              genie_space_ids: ${var.genie_space_ids}
              volume_name: ${var.volume_name}
              enriched_docs_table: ${var.enriched_docs_table}
              llm_endpoint: ${var.llm_endpoint}
              llm_endpoint_clarification: ${var.llm_endpoint_clarification}
              llm_endpoint_planning: ${var.llm_endpoint_planning}
              llm_endpoint_sql_synthesis_table: ${var.llm_endpoint_sql_synthesis_table}
              llm_endpoint_sql_synthesis_genie: ${var.llm_endpoint_sql_synthesis_genie}
              llm_endpoint_execution: ${var.llm_endpoint_execution}
              llm_endpoint_summarize: ${var.llm_endpoint_summarize}
              sample_size: ${var.sample_size}
              max_unique_values: ${var.max_unique_values}
              vs_endpoint_name: ${var.vs_endpoint_name}
              embedding_model: ${var.embedding_model}
              lakebase_instance_name: ${var.lakebase_instance_name}
              lakebase_embedding_endpoint: ${var.lakebase_embedding_endpoint}
              lakebase_embedding_dims: ${var.lakebase_embedding_dims}
          timeout_seconds: 1200

    agent_deploy:
      name: multi_agent_deploy
      description: >-
        Deploy agent to Model Serving: logs model to MLflow, registers in
        Unity Catalog, deploys to a serving endpoint, then validates the live endpoint.
      tags:
        project: multi_agent_genie
        pipeline: agent
      tasks:
        # -------------------------------------------------------------------
        # Task 1 — Deploy to Model Serving
        # -------------------------------------------------------------------
        - task_key: deploy_agent
          notebook_task:
            notebook_path: ../Notebooks/deploy_agent.py
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              sql_warehouse_id: ${var.sql_warehouse_id}
              genie_space_ids: ${var.genie_space_ids}
              volume_name: ${var.volume_name}
              enriched_docs_table: ${var.enriched_docs_table}
              llm_endpoint: ${var.llm_endpoint}
              llm_endpoint_clarification: ${var.llm_endpoint_clarification}
              llm_endpoint_planning: ${var.llm_endpoint_planning}
              llm_endpoint_sql_synthesis_table: ${var.llm_endpoint_sql_synthesis_table}
              llm_endpoint_sql_synthesis_genie: ${var.llm_endpoint_sql_synthesis_genie}
              llm_endpoint_execution: ${var.llm_endpoint_execution}
              llm_endpoint_summarize: ${var.llm_endpoint_summarize}
              sample_size: ${var.sample_size}
              max_unique_values: ${var.max_unique_values}
              vs_endpoint_name: ${var.vs_endpoint_name}
              embedding_model: ${var.embedding_model}
              lakebase_instance_name: ${var.lakebase_instance_name}
              lakebase_embedding_endpoint: ${var.lakebase_embedding_endpoint}
              lakebase_embedding_dims: ${var.lakebase_embedding_dims}
              model_name: ${var.model_name}
              endpoint_name: ${var.endpoint_name}
              workload_size: ${var.workload_size}
              scale_to_zero: ${var.scale_to_zero}
          timeout_seconds: 1800

        # -------------------------------------------------------------------
        # Task 2 — Validate live endpoint (depends on Task 1)
        # -------------------------------------------------------------------
        - task_key: validate_agent
          depends_on:
            - task_key: deploy_agent
          notebook_task:
            notebook_path: ../Notebooks/test_agent_databricks.py
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              sql_warehouse_id: ${var.sql_warehouse_id}
              genie_space_ids: ${var.genie_space_ids}
              volume_name: ${var.volume_name}
              enriched_docs_table: ${var.enriched_docs_table}
              llm_endpoint: ${var.llm_endpoint}
              llm_endpoint_clarification: ${var.llm_endpoint_clarification}
              llm_endpoint_planning: ${var.llm_endpoint_planning}
              llm_endpoint_sql_synthesis_table: ${var.llm_endpoint_sql_synthesis_table}
              llm_endpoint_sql_synthesis_genie: ${var.llm_endpoint_sql_synthesis_genie}
              llm_endpoint_execution: ${var.llm_endpoint_execution}
              llm_endpoint_summarize: ${var.llm_endpoint_summarize}
              sample_size: ${var.sample_size}
              max_unique_values: ${var.max_unique_values}
              vs_endpoint_name: ${var.vs_endpoint_name}
              embedding_model: ${var.embedding_model}
              lakebase_instance_name: ${var.lakebase_instance_name}
              lakebase_embedding_endpoint: ${var.lakebase_embedding_endpoint}
              lakebase_embedding_dims: ${var.lakebase_embedding_dims}
          timeout_seconds: 1200
