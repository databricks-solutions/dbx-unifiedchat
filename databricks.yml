# yaml-language-server: $schema=bundle_config_schema.json
#
# Databricks Asset Bundle — Multi-Agent Genie System
#
# Deploy:
#   databricks bundle deploy                   # deploy dev (default)
#   databricks bundle deploy -t prod           # deploy prod
#
# Run the ETL pipeline:
#   databricks bundle run etl_pipeline         # run dev
#   databricks bundle run etl_pipeline -t prod # run prod
#
# Validate:
#   databricks bundle validate

bundle:
  name: dbx-unifiedchat

include:
  - resources/*.yml

# ---------------------------------------------------------------------------
# Variables — single source of truth for ALL configuration
# ---------------------------------------------------------------------------
variables:
  # ---- Unity Catalog ----
  catalog_name:
    description: Unity Catalog catalog name
    default: yyang
  schema_name:
    description: Unity Catalog schema name
    default: multi_agent_genie

  # ---- SQL Warehouse ----
  sql_warehouse_id:
    description: SQL Warehouse ID used by Genie spaces and UC functions
    default: a4ed2ccbda385db9

  # ---- Genie Space IDs (comma-separated string) ----
  genie_space_ids:
    description: Comma-separated Genie space IDs
    default: "01f106e1239d14b28d6ab46f9c15e540,01f106e121e7173d8cf84bb80e842d6c,01f106e120b718e084598e92dcf14d4e"

  # ---- Volume / table names (short names — FQ derived at runtime) ----
  volume_name:
    description: UC Volume name for Genie exports (short name)
    default: volume
  enriched_docs_table:
    description: Enriched docs delta table (short name, FQ = catalog.schema.this)
    default: enriched_genie_docs
  source_table:
    description: Source chunks table name (short name, FQ = catalog.schema.this)
    default: enriched_genie_docs_chunks

  # ---- LLM Endpoints ----
  llm_endpoint:
    description: Default/fallback LLM endpoint for metadata enrichment
    default: databricks-claude-sonnet-4-5
  llm_endpoint_clarification:
    description: LLM endpoint for clarification agent
    default: databricks-claude-haiku-4-5
  llm_endpoint_planning:
    description: LLM endpoint for planning agent
    default: databricks-claude-sonnet-4-5
  llm_endpoint_sql_synthesis_table:
    description: LLM endpoint for SQL synthesis (table route)
    default: databricks-claude-sonnet-4-5
  llm_endpoint_sql_synthesis_genie:
    description: LLM endpoint for SQL synthesis (genie route)
    default: databricks-claude-sonnet-4-5
  llm_endpoint_execution:
    description: LLM endpoint for execution agent
    default: databricks-claude-haiku-4-5
  llm_endpoint_summarize:
    description: LLM endpoint for summarize agent
    default: databricks-claude-haiku-4-5

  # ---- Enrichment tuning ----
  sample_size:
    description: Number of sample rows per column
    default: "20"
  max_unique_values:
    description: Max unique values for value dictionaries
    default: "20"

  # ---- UC Function short names (comma-separated, FQ = catalog.schema.name) ----
  uc_function_names:
    description: Comma-separated list of UC function short names used by agents
    default: "get_space_summary,get_table_overview,get_column_detail,get_space_instructions,get_space_details"

  # ---- Vector Search ----
  vs_endpoint_name:
    description: Vector Search endpoint name
    default: genie_multi_agent_vs
  embedding_model:
    description: Embedding model endpoint name
    default: databricks-gte-large-en
  pipeline_type:
    description: VS index pipeline type (TRIGGERED or CONTINUOUS)
    default: TRIGGERED

  # ---- Lakebase (state management) ----
  lakebase_instance_name:
    description: Lakebase instance for agent state (checkpoints + store)
    default: multi-agent-genie-system-state-db
  lakebase_embedding_endpoint:
    description: Embedding endpoint for Lakebase store semantic search
    default: databricks-gte-large-en
  lakebase_embedding_dims:
    description: Embedding dimensions for Lakebase store
    default: "1024"

  # ---- Model Serving ----
  model_name:
    description: UC model name suffix (FQ = catalog.schema.this)
    default: super_agent_hybrid
  endpoint_name:
    description: Model Serving endpoint name
    default: multi-agent-genie-endpoint
  workload_size:
    description: Model Serving workload size
    default: Small
  scale_to_zero:
    description: Whether to enable scale-to-zero on the endpoint
    default: "false"

# ---------------------------------------------------------------------------
# Targets — dev & prod
# ---------------------------------------------------------------------------
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-serverless-dbx-unifiedchat-dev.cloud.databricks.com/
    variables:
      catalog_name: serverless_dbx_unifiedchat_dev_catalog
      schema_name: multi_agent_genie
      sql_warehouse_id: 78ad038820b88d95
      genie_space_ids: "01f11b27d1121e2bb00d6ecd846b1988,01f11b27d23a1ab195fa7ba8efc06d13,01f11b27d3ea149694cf608c3d278673"
      model_name: super_agent_hybrid
      endpoint_name: multi-agent-genie-endpoint-dev

  prod:
    workspace:
      host: https://fevm-serverless-dbx-unifiedchat.cloud.databricks.com
    variables:
      catalog_name: serverless_dbx_unifiedchat_catalog
      schema_name: multi_agent_genie
      sql_warehouse_id: a4ed2ccbda385db9
      genie_space_ids: "01f106e1239d14b28d6ab46f9c15e540,01f106e121e7173d8cf84bb80e842d6c,01f106e120b718e084598e92dcf14d4e"
      model_name: super_agent_hybrid
      endpoint_name: multi-agent-genie-endpoint

sync:
  exclude:
    - ./.venv/**
    - ./data/**
    - /__pycache__/*
