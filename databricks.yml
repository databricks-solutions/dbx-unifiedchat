# yaml-language-server: $schema=bundle_config_schema.json
#
# Databricks Asset Bundle — Multi-Agent Genie System
#
# Deploy:
#   databricks bundle deploy                   # deploy dev (default)
#   databricks bundle deploy -t prod           # deploy prod
#
# Run the ETL pipeline:
#   databricks bundle run etl_pipeline         # run dev
#   databricks bundle run etl_pipeline -t prod # run prod
#
# Validate:
#   databricks bundle validate

bundle:
  name: dbx-unifiedchat

# ---------------------------------------------------------------------------
# Variables — parameterise everything, override per target
# ---------------------------------------------------------------------------
variables:
  # Unity Catalog
  catalog_name:
    description: Unity Catalog catalog name
    default: yyang
  schema_name:
    description: Unity Catalog schema name
    default: multi_agent_genie

  # Genie Space IDs (comma-separated string for notebook widget)
  genie_space_ids:
    description: Comma-separated Genie space IDs
    default: "01f106e1239d14b28d6ab46f9c15e540,01f106e121e7173d8cf84bb80e842d6c,01f106e120b718e084598e92dcf14d4e"

  # Volume / table names
  volume_name:
    description: UC Volume name for Genie exports
    default: volume
  genie_exports_volume:
    description: Fully-qualified UC volume for Genie exports
    default: yyang.multi_agent_genie.volume
  enriched_docs_table:
    description: Fully-qualified enriched docs delta table
    default: yyang.multi_agent_genie.enriched_genie_docs
  source_table:
    description: Source chunks table name (relative to catalog.schema)
    default: enriched_genie_docs_chunks

  # LLM
  llm_endpoint:
    description: LLM model serving endpoint for metadata enrichment
    default: databricks-claude-sonnet-4-5

  # Enrichment tuning
  sample_size:
    description: Number of sample rows per column
    default: "20"
  max_unique_values:
    description: Max unique values for value dictionaries
    default: "20"

  # Vector Search
  vs_endpoint_name:
    description: Vector Search endpoint name
    default: genie_multi_agent_vs
  embedding_model:
    description: Embedding model endpoint name
    default: databricks-gte-large-en
  pipeline_type:
    description: VS index pipeline type (TRIGGERED or CONTINUOUS)
    default: TRIGGERED

# ---------------------------------------------------------------------------
# Resources — ETL pipeline job (serverless compute)
# ---------------------------------------------------------------------------
resources:
  jobs:
    etl_pipeline:
      name: multi_agent_genie_etl_pipeline
      description: >-
        End-to-end ETL pipeline: export Genie spaces, enrich table metadata
        with LLM, and build the vector search index.
        Runs on serverless compute (no cluster definition needed).
      max_concurrent_runs: 1
      tags:
        project: multi_agent_genie
        pipeline: etl

      # ---------------------------------------------------------------
      # Task 1 — Export Genie Spaces to UC Volume
      # ---------------------------------------------------------------
      tasks:
        - task_key: export_genie_spaces
          notebook_task:
            notebook_path: ./etl/01_export_genie_spaces.py
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              volume_name: ${var.volume_name}
              genie_space_ids: ${var.genie_space_ids}
              databricks_host: ""
              databricks_token: ""
          timeout_seconds: 3600

        # ---------------------------------------------------------------
        # Task 2 — Enrich Table Metadata (depends on Task 1)
        # ---------------------------------------------------------------
        - task_key: enrich_table_metadata
          depends_on:
            - task_key: export_genie_spaces
          notebook_task:
            notebook_path: ./etl/02_enrich_table_metadata.py
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              genie_exports_volume: ${var.genie_exports_volume}
              enriched_docs_table: ${var.enriched_docs_table}
              llm_endpoint: ${var.llm_endpoint}
              sample_size: ${var.sample_size}
              max_unique_values: ${var.max_unique_values}
          timeout_seconds: 7200

        # ---------------------------------------------------------------
        # Task 3 — Build Vector Search Index (depends on Task 2)
        # ---------------------------------------------------------------
        - task_key: build_vector_search_index
          depends_on:
            - task_key: enrich_table_metadata
          notebook_task:
            notebook_path: ./etl/03_build_vector_search_index.py
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              source_table: ${var.source_table}
              vs_endpoint_name: ${var.vs_endpoint_name}
              embedding_model: ${var.embedding_model}
              pipeline_type: ${var.pipeline_type}
          timeout_seconds: 3600

    agent_integration_test:
      name: multi_agent_integration_test
      description: Test agent code before deployment
      tasks:
        - task_key: test_agent
          notebook_task:
            notebook_path: ./Notebooks/test_agent_databricks.py
            source: WORKSPACE
          timeout_seconds: 1200

    agent_deploy:
      name: multi_agent_deploy
      description: Deploy agent to Model Serving
      tasks:
        - task_key: validate_agent
          notebook_task:
            notebook_path: ./Notebooks/test_agent_databricks.py
            source: WORKSPACE
        - task_key: deploy_agent
          depends_on:
            - task_key: validate_agent
          notebook_task:
            notebook_path: ./Notebooks/deploy_agent.py
            source: WORKSPACE
          timeout_seconds: 1800

# ---------------------------------------------------------------------------
# Targets — dev & prod
# ---------------------------------------------------------------------------
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-984752964297111.11.azuredatabricks.net

  prod:
    workspace:
      # Deployment target — matches .env TARGET_DATABRICKS_HOST
      # Auth: set DATABRICKS_TOKEN env var or use `databricks auth login`
      host: https://fevm-serverless-dbx-unifiedchat.cloud.databricks.com
    variables:
      # Production overrides for fevm-serverless-dbx-unifiedchat workspace
      catalog_name: serverless_dbx_unifiedchat_catalog
      schema_name: multi_agent_genie
      genie_space_ids: "01f106e1239d14b28d6ab46f9c15e540,01f106e121e7173d8cf84bb80e842d6c,01f106e120b718e084598e92dcf14d4e"
      genie_exports_volume: serverless_dbx_unifiedchat_catalog.multi_agent_genie.volume
      enriched_docs_table: serverless_dbx_unifiedchat_catalog.multi_agent_genie.enriched_genie_docs
      llm_endpoint: databricks-claude-sonnet-4-5
      sample_size: "20"
      max_unique_values: "20"
      vs_endpoint_name: genie_multi_agent_vs
      embedding_model: databricks-gte-large-en
      pipeline_type: TRIGGERED

sync:
  exclude:
    - ./.venv/**
    - ./data/**
    - /__pycache__/*
